<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020B18">
  <meta name="color-scheme" content="dark">

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src https://fonts.gstatic.com;
                 connect-src https://generativelanguage.googleapis.com;
                 img-src 'self' data:;
                 object-src 'none';
                 base-uri 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="microphone=(self), camera=()">

  <!-- SEO Meta Tags -->
  <title>StadiumIQ 2026 — AI-Powered FIFA World Cup Stadium Intelligence Platform</title>
  <meta name="description" content="StadiumIQ 2026 is a GenAI-powered platform for FIFA World Cup 2026 stadium operations. Features AI navigation, crowd management, accessibility, transport, sustainability, multilingual support, and real-time decision intelligence.">
  <meta name="keywords" content="FIFA World Cup 2026, AI stadium, GenAI, crowd management, stadium navigation, accessibility, sustainability, multilingual, smart venue, Google Gemini">
  <meta name="author" content="StadiumIQ Team">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="StadiumIQ 2026 — FIFA World Cup AI Platform">
  <meta property="og:description" content="8 AI modules powering the most intelligent FIFA World Cup stadium experience ever — navigation, crowd safety, accessibility, transport, sustainability, and more.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Preload critical font -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;600;700;800&display=swap">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "StadiumIQ 2026",
    "description": "GenAI-powered FIFA World Cup 2026 stadium intelligence platform with 8 AI modules for crowd management, navigation, accessibility, transport, sustainability, multilingual support, operations, and decision support.",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "Web Browser",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "AI Navigation & Wayfinding",
      "Crowd Intelligence & Safety",
      "Accessibility Hub (ASL, Audio Description)",
      "Smart Transport Planner",
      "Sustainability & CO2 Tracking",
      "Global Concierge (50+ Languages)",
      "Operational Intelligence Dashboard",
      "Real-time Decision Support"
    ],
    "keywords": "FIFA World Cup 2026, AI, crowd management, stadium navigation, Google Gemini"
  }
  </script>
</head>
<body>
  <!-- Skip to main content (Accessibility) -->
  <a href="#pageContent" class="skip-link">Skip to main content</a>

  <!-- App Root -->
  <div id="app" role="application" aria-label="StadiumIQ 2026 — FIFA World Cup AI Platform">
    <!-- Rendered by app.js -->

    <!-- Loading Screen (shown before JS loads) -->
    <div id="loadingScreen" aria-live="polite" aria-label="Loading StadiumIQ 2026" style="
      position: fixed; inset: 0;
      background: #020B18;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      z-index: 9999;
    ">
      <div style="
        width: 80px; height: 80px;
        background: linear-gradient(135deg, #C8102E 0%, #FF6D00 50%, #FFD700 100%);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 2.5rem;
        box-shadow: 0 0 40px rgba(200,16,46,0.5);
        animation: float 2s ease-in-out infinite;
      " role="img" aria-label="StadiumIQ logo">⚽</div>
      <div style="text-align:center;">
        <div style="
          font-family: 'Outfit', sans-serif;
          font-size: 1.8rem;
          font-weight: 800;
          color: #F0F4FF;
          letter-spacing: 2px;
        ">StadiumIQ 2026</div>
        <div style="
          font-size: 0.75rem;
          color: #FFD700;
          font-weight: 600;
          letter-spacing: 3px;
          text-transform: uppercase;
          margin-top: 4px;
        ">FIFA World Cup 2026 · AI Platform</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center; margin-top:8px;" role="progressbar" aria-label="Loading">
        <div style="width:8px;height:8px;border-radius:50%;background:#C8102E;animation:loader-bounce 1.4s infinite ease-in-out;animation-delay:0s;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#003DA5;animation:loader-bounce 1.4s infinite ease-in-out;animation-delay:0.2s;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#FFD700;animation:loader-bounce 1.4s infinite ease-in-out;animation-delay:0.4s;"></div>
      </div>
      <div style="font-size:0.75rem; color:#4A6080; letter-spacing:1px;" aria-live="polite">Loading AI modules...</div>
    </div>
  </div>

  <!-- Loading animation styles -->
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes loader-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    /* Skip link styles — fully visible on focus */
    .skip-link {
      position: fixed;
      top: -100%;
      left: 10px;
      z-index: 99999;
      padding: 8px 16px;
      background: #FFD700;
      color: #000;
      border-radius: 8px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: top 0.2s ease;
    }
    .skip-link:focus {
      top: 10px;
      outline: 3px solid #C8102E;
      outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      @keyframes float { 0%, 100% { transform: none; } }
      @keyframes loader-bounce { 0%, 100% { transform: scale(1); opacity: 1; } }
    }
  </style>

  <!-- Scripts — defer prevents render-blocking; load order still maintained -->
  <!-- security.js MUST load first to provide sanitization to all other scripts -->
  <script src="js/security.js" defer></script>
  <script src="js/gemini.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/dashboard.js" defer></script>
  <script src="js/navigation.js" defer></script>
  <script src="js/crowd.js" defer></script>
  <script src="js/accessibility.js" defer></script>
  <script src="js/modules.js" defer></script>

  <!-- Hide loading screen once all deferred scripts have run -->
  <script defer>
    window.addEventListener('load', () => {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen) {
        setTimeout(() => {
          loadingScreen.style.transition = 'opacity 0.5s ease';
          loadingScreen.style.opacity = '0';
          setTimeout(() => loadingScreen.remove(), 500);
        }, 1200);
      }
    });
  </script>
</body>
</html>
